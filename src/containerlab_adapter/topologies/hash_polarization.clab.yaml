# hash-polarization scenario — containerlab + SONiC spec.
#
# 2-leaf × 1-spine × 4-hosts topology that exhibits ECMP polarization
# when the per-flow hash function collapses to a single nexthop.
#
# Substrate (rewired 2026-05-21 from netreplica/docker-sonic-vs to
# vrnetlab/sonic_sonic-vs:20260520, kind sonic-vs → sonic-vm):
#   - Runs a real SAI VS pipeline inside a KVM/TCG VM rather than the
#     netreplica systemd-in-container shim. Ticking SAI counters in
#     COUNTERS_DB; per-priority PFC; PG watermark headroom.
#   - The trade-off vs the netreplica shim: VMs take ~13 min wall-clock
#     to reach swss=active on m5.2xlarge under TCG (~45s on c5.metal
#     under KVM). The shim booted in ~30s but had no real SAI counter
#     pipeline — see feedback_sonic_vs_counter_pipeline memory.
#
# Per-node startup-configs in hash-polarization/<node>/config_db.json
# are generated by sonic-substrate-recipe's gen_startup_config.py.
# These files do not yet exist at Session 1 close — Session 2 of the
# Phase 6 plan generates them after the density measurement settles
# the IP plan and the BGP-vs-static routing decision.
#
# References:
#   https://containerlab.dev/manual/kinds/sonic-vm/
#   sonic-substrate-recipe/README.md — three load-bearing gotchas
#   PHASE6_PLAN_v0.1.md — full multi-session sequence

name: hash-polarization

mgmt:
  network: clab-hash-polarization
  ipv4-subnet: 172.100.100.0/24
  ipv6-subnet: 3fff:172:100:100::/64

topology:
  kinds:
    sonic-vm:
      image: vrnetlab/sonic_sonic-vs:20260520
  nodes:
    spine1:
      kind: sonic-vm
      startup-config: ./hash-polarization/spine1/config_db.json
    leaf1:
      kind: sonic-vm
      startup-config: ./hash-polarization/leaf1/config_db.json
    leaf2:
      kind: sonic-vm
      startup-config: ./hash-polarization/leaf2/config_db.json
    host1:
      kind: linux
      image: ghcr.io/srl-labs/network-multitool
    host2:
      kind: linux
      image: ghcr.io/srl-labs/network-multitool
    host3:
      kind: linux
      image: ghcr.io/srl-labs/network-multitool
    host4:
      kind: linux
      image: ghcr.io/srl-labs/network-multitool
  links:
    # SONiC `eth1` maps to data port `Ethernet0`, `eth2` → `Ethernet4`,
    # etc. (the standard SONiC port enumeration follows 4-lane
    # boundaries). Containerlab's link spec uses the container-side
    # `ethN` names; only declared NICs surface in SAI (see
    # filter_available_lanes gotcha in sonic-substrate-recipe README).
    - endpoints: ["spine1:eth1", "leaf1:eth1"]
    - endpoints: ["spine1:eth2", "leaf2:eth1"]
    - endpoints: ["leaf1:eth2", "host1:eth1"]
    - endpoints: ["leaf1:eth3", "host2:eth1"]
    - endpoints: ["leaf2:eth2", "host3:eth1"]
    - endpoints: ["leaf2:eth3", "host4:eth1"]
